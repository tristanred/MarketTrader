services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: markettrader
      POSTGRES_PASSWORD: markettrader
      POSTGRES_DB: markettrader
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U markettrader']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://markettrader:markettrader@db:5432/markettrader
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      NODE_ENV: production
      SENTRY_DSN: ${SENTRY_DSN:-}
      STOCK_PROVIDER: ${STOCK_PROVIDER:-yahoo}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
    expose:
      - '3000'

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '80:80'

volumes:
  postgres_data:
