server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/wasm image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    # CSP intentionally permissive for the SPA — tighten once external script
    # sources (analytics, error reporting) are finalized.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' ws: wss:; font-src 'self' data:" always;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed asset bundles. Vite emits files under /assets with
    # content hashes in the filename, so they're safe to cache forever.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket: must match before the generic /api proxy block.
    location ~ ^/api/games/[^/]+/live$ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }

    # REST API: /api/* → server:3000/*
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # The refresh cookie is scoped to Path=/auth/refresh on the server.
        # Browsers only send the cookie back when the request path matches,
        # so rewrite to the /api/-prefixed path the SPA actually requests.
        proxy_cookie_path /auth/refresh /api/auth/refresh;
    }
}
