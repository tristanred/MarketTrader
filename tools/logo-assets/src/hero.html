<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MarketTrader hero</title>
  <style>
    @font-face {
      font-family: 'Geist';
      font-weight: 400;
      src: url('https://cdn.jsdelivr.net/fontsource/fonts/geist-sans@latest/latin-400-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist';
      font-weight: 600;
      src: url('https://cdn.jsdelivr.net/fontsource/fonts/geist-sans@latest/latin-600-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist';
      font-weight: 800;
      src: url('https://cdn.jsdelivr.net/fontsource/fonts/geist-sans@latest/latin-700-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist Mono';
      font-weight: 400;
      src: url('https://cdn.jsdelivr.net/fontsource/fonts/geist-mono@latest/latin-400-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist Mono';
      font-weight: 600;
      src: url('https://cdn.jsdelivr.net/fontsource/fonts/geist-mono@latest/latin-600-normal.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Geist Mono';
      font-weight: 800;
      src: url('https://cdn.jsdelivr.net/fontsource/fonts/geist-mono@latest/latin-700-normal.woff2') format('woff2');
    }
    :root {
      --bg: #0a0b0d;
      --panel: #0c0d10;
      --hairline: #161719;
      --hairline-strong: #1d1f23;
      --text: #e8e9ea;
      --text-strong: #f4f4f5;
      --muted: #6b7280;
      --accent: #67e8f9;
      --gain: #10b981;
      --loss: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-feature-settings: 'tnum' 1, 'zero' 1;
    }
    .hero {
      width: 1280px;
      height: 360px;
      padding: 56px 64px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 36px;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--hairline-strong);
    }
    /* faint grid background */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--hairline) 1px, transparent 1px),
        linear-gradient(90deg, var(--hairline) 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.5;
      pointer-events: none;
    }
    /* soft radial vignette so corners feel held */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(120% 80% at 50% 110%, rgba(103, 232, 249, 0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .mark { position: relative; z-index: 1; }
    .word { position: relative; z-index: 1; display: flex; flex-direction: column; gap: 14px; }
    .word .title {
      font-family: 'Geist Mono', monospace;
      font-weight: 800;
      font-size: 76px;
      line-height: 0.92;
      letter-spacing: -0.045em;
      color: var(--text-strong);
    }
    .word .title .dot { color: var(--accent); margin: 0 4px; }
    .word .tagline {
      font-family: 'Geist Mono', monospace;
      font-weight: 400;
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .word .tagline em {
      color: var(--accent);
      font-style: normal;
    }

    .meta {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
      text-align: right;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .meta .row { display: flex; gap: 14px; align-items: center; justify-content: flex-end; }
    .meta .v { color: var(--text-strong); font-weight: 600; }
    .meta .gain { color: var(--gain); font-weight: 600; }
    .meta .loss { color: var(--loss); font-weight: 600; }
    .meta .accent { color: var(--accent); font-weight: 600; }
    .meta .pulse {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(103, 232, 249, 0.5);
    }
  </style>
</head>
<body>
  <div class="hero" id="hero">
    <!-- Candlestick monogram: green up + red down, locked into a glyph -->
    <svg width="140" height="180" viewBox="0 0 140 180" xmlns="http://www.w3.org/2000/svg" aria-label="MarketTrader mark" class="mark">
      <!-- outer frame -->
      <rect x="1" y="1" width="138" height="178" fill="none" stroke="#1d1f23" stroke-width="1"/>
      <!-- internal gridlines -->
      <g stroke="#161719" stroke-width="1">
        <line x1="0" y1="45" x2="140" y2="45"/>
        <line x1="0" y1="90" x2="140" y2="90"/>
        <line x1="0" y1="135" x2="140" y2="135"/>
        <line x1="35" y1="0" x2="35" y2="180"/>
        <line x1="70" y1="0" x2="70" y2="180"/>
        <line x1="105" y1="0" x2="105" y2="180"/>
      </g>
      <!-- left candle (green up) -->
      <line x1="46" y1="28" x2="46" y2="152" stroke="#10b981" stroke-width="2.5"/>
      <rect x="36" y="52" width="20" height="72" fill="#10b981"/>
      <!-- right candle (red down) -->
      <line x1="94" y1="34" x2="94" y2="160" stroke="#ef4444" stroke-width="2.5"/>
      <rect x="84" y="62" width="20" height="66" fill="#ef4444"/>
      <!-- crosshair connector -->
      <line x1="46" y1="90" x2="94" y2="90" stroke="#67e8f9" stroke-width="2"/>
      <circle cx="70" cy="90" r="3.5" fill="#67e8f9"/>
    </svg>

    <div class="word">
      <div class="title">MARKET<span class="dot">·</span>TRADER</div>
      <div class="tagline">Real prices · virtual stakes · <em>friends competing live</em></div>
    </div>

    <div class="meta">
      <div class="row"><span class="pulse"></span><span class="accent">LIVE</span></div>
      <div class="row"><span class="gain">+7.10%</span><span>·</span><span class="loss">−1.12%</span></div>
      <div class="row"><span>43 ACHIEVEMENTS</span></div>
      <div class="row"><span>OPEN-SOURCE · MIT</span></div>
    </div>
  </div>
</body>
</html>
